<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔套适配系统 V3.7</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:#0b0f17;
    color:#e5e7eb;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
}

.app{
    width:100%;
    max-width:480px;
    padding:16px;
}

h1{text-align:center;font-size:20px;}

.card{
    background:#111827;
    border-radius:16px;
    border:1px solid #1f2937;
    padding:10px 14px;
    margin-bottom:10px;
}

input[type="range"]{
    width:100%;
    margin-top:10px;
    height:18px;
}

.row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
}

.big{
    font-size:24px;
    font-weight:900;
}

.tag{
    font-size:18px;
    font-weight:800;
    padding:6px 12px;
    border-radius:10px;
    background:#1f2937;
    text-align:center;
}

.tag.xs{background:#22c55e;}
.tag.s{background:#60a5fa;}
.tag.m{background:#a78bfa;}
.tag.l{background:#f59e0b;}
.tag.xl{background:#ef4444;}

.tag.d1{background:#0ea5e9;}
.tag.d2{background:#14b8a6;}
.tag.d3{background:#eab308;}
.tag.d4{background:#f97316;}
.tag.d5{background:#ef4444;}
.tag.d6{background:#c026d3;}

.stepper{
    display:flex;
    align-items:center;
    gap:10px;
}

.stepper button {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #0b1220;
  color: #fff;
  font-size: 28px;
  font-weight: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  line-height: 1;
  transition: transform 0.08s ease, box-shadow 0.08s ease;
}

.stepper button:active {
  transform: scale(0.92);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
}

.switch{
    display:flex;
    gap:10px;
}

.switch button{
    flex:1;
    padding:12px;
    font-size:18px;
    border-radius:12px;
    border:1px solid #374151;
    background:#0f172a;
    color:#fff;
}

.switch .active{background:#2563eb;}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#0f172a;
    border:1px solid #374151;
    border-radius:14px;
    padding:12px;
    margin-top:10px;
    font-size:22px;
    line-height:1.45;
}

.del{
    background:#1f2937;
    border:none;
    color:#fff;
    padding:8px 10px;
    border-radius:8px;
    font-size:18px;
    font-weight:800;
}

.del {
    background: #f97316;
    color: #fff;
}

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    max-width:480px;
    margin:auto;
    display:flex;
    gap:10px;
    padding:12px 0;
    background:transparent;
}

.bottom button{
    flex:1;
    padding:14px;
    font-size:18px;
    font-weight:900;
    border:none;
    border-radius:12px;
}

.bottom button:disabled{
    opacity:0.4;
    cursor:not-allowed;
}

.toast{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:#22c55e;
    padding:10px 14px;
    border-radius:10px;
    font-weight:800;
    opacity:0;
}

#confirmPanel {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:100;
  justify-content:center;
  align-items:center;
}

#confirmBox {
  background:#111827;
  border-radius:16px;
  padding:20px;
  width:92%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.45);
}

#confirmText {
  font-size:26px;
  font-weight:900;
  margin-bottom:10px;
}

#confirmHint {
  font-size: 20px;
  font-weight:800;
  color:#FCD34D;
  margin-bottom:20px;
}

.confirm-btns {
  display:flex;
  gap:12px;
}

.confirm-btns button {
  flex:1;
  padding:14px;
  font-size:18px;
  font-weight:900;
  border-radius:12px;
  border:none;
}

#confirmCancel {
  background:#374151;
  color:#fff;
}

#confirmSave {
  background:#22c55e;
  color:#000;
}

#historyPanel {
    width:100%;
    max-width:480px;
    margin:0 auto;
    box-sizing:border-box;
    padding-bottom:120px;
}

#previewCount {
    color: #FCD34D;
}

#preview {
    text-align: center;
}

#q {
  font-size: 28px;
  color: #f97316;
}

#previewCard .stepper#previewStepper {
    display: flex !important;
    justify-content: center !important;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
}

.locked{
    opacity:0.4;
    pointer-events:none;
}

.hint{
    font-size:16px;
    font-weight:800;
    color:#FCD34D;
    white-space:nowrap;
    transform: translateX(-6px);
}

/* ✅ 闪烁 3 次，节奏舒服 */
#hint.blink {
  animation: hintBlink 1.8s ease-in-out 1;
}

.dia-hint{
    font-size:16px;
    font-weight:800;
    color:#FCD34D;
    white-space:nowrap;
    display:none;
}

.dia-hint.blink {
  animation: hintBlink 1.8s ease-in-out 1;
}

/* ✅ Copy All 文字闪烁 */
#copyBtn.blink {
  animation: hintBlink 1.8s ease-in-out 1;
}

@keyframes hintBlink {
  0%, 100% { opacity: 1; }
  15% { opacity: 0.25; }
  30% { opacity: 1; }
  45% { opacity: 0.25; }
  60% { opacity: 1; }
  75% { opacity: 0.25; }
}

#Lc{
    font-size:20px;
}

#Dc{
    font-size:20px;
}

#copyBtn {
    border: 2px solid #f97316;
    background: #f97316;
    color: #0b0f17;
}
</style>
</head>

<body>

<div class="app">
<h1>笔套适配系统 V3.7</h1>

<div class="card">
  <div class="row">

    <div id="supportedQtyTitle"
         style="font-size:18px;font-weight:800; display:none; margin-right:6px;">
      支持数量 =
    </div>

    <span class="hint" id="hint"
          style="display:none; font-size:18px;">👉 请先设置支持数量</span>

    <div class="stepper total-stepper" style="margin:0;gap:6px; display:flex; align-items:center;">
      <button onclick="setLimit(-1)">–</button>
      <div class="big" id="limitVal" style="color:#FCD34D;">0</div>
      <button onclick="setLimit(1)">+</button>
    </div>

  </div>
</div>

<!-- ✅ Diameter 在上 -->
<div class="card">
<input type="range" id="D" min="7" max="18.5" step="0.1" value="7">

<div class="row" style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
  <div class="stepper adjust" style="margin:0;gap:6px;">
    <button id="diaMinusBtn" onclick="diaStep(-0.1)">–</button>
    <div class="big" id="Dv">7.0</div>
    <button id="diaPlusBtn" onclick="diaStep(0.1)">+</button>
  </div>

  <div class="dia-hint" id="diaHint">选择笔夹类型</div>

  <div class="switch" style="margin:0;gap:6px;">
    <button id="c1" onclick="mode('clipped')">有笔夹</button>
    <button id="c2" onclick="mode('clipless')">无笔夹</button>
  </div>
</div>
<div class="tag" id="Dc" style="margin-top:10px;text-align:center;"></div>
</div>

<!-- ✅ Length 在下 -->
<div class="card">
<div class="row" style="justify-content:center;gap:10px;">
<div style="font-size:18px;font-weight:800;">长度</div>
<div class="stepper adjust" style="margin:0;gap:6px;">
<button onclick="lenStep(-0.1)">–</button>
<div class="big" id="Lv">85.0</div>
<button onclick="lenStep(0.1)">+</button>
</div>
</div>
<input type="range" min="85" max="165" step="1" value="85" id="L">
<div class="tag" id="Lc" style="margin-top:10px;text-align:center;"></div>
</div>

<div class="card" id="previewCard">
<div class="row" style="display:flex;justify-content:flex-start;align-items:center;gap:6px;">
  <label style="font-size:20px;font-weight:800;">适配结果预览</label>
  <div class="big" id="previewCount" style="font-size:22px;font-weight:800;"></div>
</div>

<div id="preview" style="font-size:28px;font-weight:900;margin-top:10px;"></div>

<div class="row" style="margin-top:10px;display:flex;justify-content:center;align-items:center;gap:6px;">
  <div style="font-size:18px;font-weight:800;">配置数量</div>
  <div class="stepper" style="margin:0;gap:6px;">
    <button onclick="qty(-1)">–</button>
    <div class="big" id="q">0</div>
    <button onclick="qty(1)">+</button>
  </div>
</div>
</div>

<div id="historyPanel">
  <div id="history"></div>
</div>

<div class="bottom">
<button id="genBtn" style="background:#2563eb;color:#fff" onclick="showConfirm()">保存配置</button>
<button id="copyBtn" onclick="copy()" disabled>复制全部</button>
<button id="clearBtn" style="background:#ef4444;color:#fff" onclick="clearAll()">清空</button>
</div>

<div class="toast" id="toast"></div>

<div id="confirmPanel">
  <div id="confirmBox">
    <div id="confirmText"></div>
    <div id="confirmHint">保存前请确认</div>
    <div class="confirm-btns">
      <button id="confirmCancel" onclick="hideConfirm()">取消</button>
      <button id="confirmSave" onclick="doSave()">保存</button>
    </div>
  </div>
</div>

<script>
function clean(v) {
  return Number.isInteger(v) ? v.toString() : v.toFixed(1);
}

let state = {
  limit: 0,
  used: 0,
  qty: 0,
  mode: null,
  length: 85,
  dia: 7,
  history: {}
};

const L = document.getElementById("L");
const D = document.getElementById("D");

const diaMinusBtn = document.getElementById("diaMinusBtn");
const diaPlusBtn = document.getElementById("diaPlusBtn");
const diaHintEl = document.getElementById("diaHint");

const c1 = document.getElementById("c1");
const c2 = document.getElementById("c2");

function applyModeConstraints() {
  if (state.mode === "clipped") {
    D.min = 7;
    D.max = 18.5;
    state.dia = 7;
  } else {
    D.min = 8.5;
    D.max = 20.5;
    state.dia = 8.5;
  }
  D.value = state.dia;
}

function save() {
  localStorage.setItem("psfs_v37", JSON.stringify(state));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem("psfs_v37"));
    if (d) state = d;
  } catch (_) {}
}

load();
applyModeConstraints();

const genBtn = document.getElementById("genBtn");
const copyBtn = document.getElementById("copyBtn");
const hint = document.getElementById("hint");

L.oninput = e => { state.length = +e.target.value; render(); save(); };
D.oninput = e => { state.dia = +e.target.value; render(); save(); };

function setLimit(v) {
  state.limit = Math.max(0, state.limit + v);
  render(); save();
}

function mode(m) {
  state.mode = m;
  applyModeConstraints();
  c1.classList.toggle("active", m === "clipped");
  c2.classList.toggle("active", m === "clipless");
  render(); save();
}

function lenStep(v) {
  state.length = Math.max(85, Math.min(165, +(state.length + v).toFixed(1)));
  L.value = state.length;
  render(); save();
}

function diaStep(v) {
  state.dia = Math.max(+D.min, Math.min(+D.max, +(state.dia + v).toFixed(1)));
  D.value = state.dia;
  render(); save();
}

function toolCode() {
  return lenCode(state.length) + diaCode(state.dia);
}

function lenCode(v) {
  const ranges = [{max:102},{max:118},{max:135},{max:150},{max:165}];
  for (let i=0;i<ranges.length;i++){
    if (v<=ranges[i].max) return i+1;
  }
  return 5;
}

function diaCode(v) {
  const ranges = state.mode === "clipped"
    ? [
        { max: 8.5, code: "A" },
        { max: 10.5, code: "B" },
        { max: 12.5, code: "C" },
        { max: 14.5, code: "D" },
        { max: 16.5, code: "E" },
        { max: 18.5, code: "F" }
      ]
    : [
        { max: 10.5, code: "A" },
        { max: 12.5, code: "B" },
        { max: 14.5, code: "C" },
        { max: 16.5, code: "D" },
        { max: 18.5, code: "E" },
        { max: 20.5, code: "F" }
      ];

  for (const r of ranges) {
    if (v <= r.max) return r.code;
  }
  return "A";
}

function qty(v) {
  if (state.limit===0) return toast("请先设置数量");
  const next = Math.max(0, state.qty+v);
  if (state.used+next>state.limit) return toast("已达上限");
  state.qty = next;
  render(); save();
}

function showConfirm() {
  if (state.limit===0 || state.mode===null) {
    toast("请先选有笔夹/无笔夹");
    return;
  }
  if (state.qty<=0) return toast("数量为 0");
  if (state.used+state.qty>state.limit) return toast("已达上限");

  const modeText = state.mode === "clipped" ? "有笔夹" : "无笔夹";
  const hl = "#f97316";

  document.getElementById("confirmText").innerHTML =
    toolCode() + " × <span style='color:" + hl + "'>" + state.qty + "</span>" +
    " (L<span style='color:" + hl + "'>" + clean(state.length) + "</span>" +
    "-Ø<span style='color:" + hl + "'>" + clean(state.dia) + "</span>" +
    "-<span style='color:" + hl + "'>" + modeText + "</span>)";

  document.getElementById("confirmPanel").style.display = "flex";
}

function hideConfirm() {
  document.getElementById("confirmPanel").style.display = "none";
}

function doSave() {
  const modeText = state.mode === "clipped" ? "有笔夹" : "无笔夹";

  const k = toolCode();

  if (!state.history[k]) {
    state.history[k] = {
      qty:0,
      snap: "(L" + clean(state.length) + "-Ø" + clean(state.dia) + "-" + modeText + ")"
    };
  }

  state.history[k].qty += state.qty;
  state.used += state.qty;

  c1.classList.remove("active");
  c2.classList.remove("active");
  state.mode = null;
  state.qty = 0;

  hideConfirm();
  render(); save();

  toast(state.used + (state.used === 1 ? " 已添加配置" : " 已添加配置"));
}

function render() {
  const title = document.getElementById("supportedQtyTitle");
  if (state.limit >= 1) {
    title.style.display = "block";
  } else {
    title.style.display = "none";
  }

  document.getElementById("limitVal").innerText = state.limit;

  const hintEl = document.getElementById("hint");
  if (state.limit === 0) {
    hintEl.style.display = "inline-block";
    hintEl.classList.add("blink");
  } else {
    hintEl.style.display = "none";
    hintEl.classList.remove("blink");
  }

  document.getElementById("Lv").innerText = state.length.toFixed(1);
  document.getElementById("Dv").innerText = state.dia.toFixed(1);

  const lc = lenCode(state.length);
  document.getElementById("Lc").innerText =
    ["XS","S","M","L","XL"][lc-1] + " (150~165 mm)";
  document.getElementById("Lc").className = "tag " +
    ["xs","s","m","l","xl"][lc-1];

  const dc = diaCode(state.dia);
  document.getElementById("Dc").innerText =
    "直径: " + ["Micro","Ultra Slim","Slim","Standard","Wide","Extra Wide"][dc.charCodeAt(0)-65];
  document.getElementById("Dc").className = "tag " +
    ["d1","d2","d3","d4","d5","d6"][dc.charCodeAt(0)-65];

  document.getElementById("q").innerText = state.qty;

  const modeText = state.mode === "clipped" ? "有笔夹" : state.mode === "clipless" ? "无笔夹" : "—";
  const hl = "#f97316";

  document.getElementById("preview").innerHTML =
    toolCode() + " × <span style='color:" + hl + "'>" + state.qty + "</span>" +
    " (L<span style='color:" + hl + "'>" + clean(state.length) + "</span>" +
    "-Ø<span style='color:" + hl + "'>" + clean(state.dia) + "</span>" +
    "-<span style='color:" + hl + "'>" + modeText + "</span>)";

  document.getElementById("previewCount").innerText =
    state.used + "/" + state.limit;

  const hasMode = state.mode !== null;

  document.querySelectorAll(".card:nth-of-type(2) .switch button")
    .forEach(b => b.disabled = state.limit === 0);

  document.querySelectorAll(".card:nth-of-type(2) .stepper button")
    .forEach(b => b.disabled = !(state.limit >= 1 && hasMode));

  D.disabled = !(state.limit >= 1 && hasMode);
  L.disabled = !(state.limit >= 1 && hasMode);

  document.querySelectorAll(".card:nth-of-type(3) .stepper button")
    .forEach(b => b.disabled = !(state.limit >= 1 && hasMode));

  document.querySelectorAll("#previewCard .stepper button")
    .forEach(b => b.disabled = !(state.limit >= 1 && hasMode));

  const diaHint = document.getElementById("diaHint");
  if (state.limit >= 1 && state.mode === null) {
    diaHint.style.display = "inline-block";
    diaHint.classList.add("blink");
  } else {
    diaHint.style.display = "none";
    diaHint.classList.remove("blink");
  }

  if (state.limit >= 1 && hasMode) {
    previewCard.classList.remove("locked");
  } else {
    previewCard.classList.add("locked");
  }

  genBtn.disabled = !(state.limit >= 1 && hasMode && state.qty > 0);

  const totalUsed = Object.values(state.history).reduce((s, i) => s + i.qty, 0);

  copyBtn.disabled = totalUsed !== state.limit;
  if (state.limit > 0 && totalUsed === state.limit) {
    copyBtn.classList.add("blink");
  } else {
    copyBtn.classList.remove("blink");
  }

  drawHistory();
  save();
}

function drawHistory() {
  const h = document.getElementById("history");
  h.innerHTML = "";
  Object.keys(state.history).sort().forEach(k=>{
    const it = state.history[k];
    const d = document.createElement("div");
    d.className = "item";
    d.innerHTML = "<div>"+k+" × "+it.qty+" "+it.snap+"</div><button class='del'>删除</button>";
    d.querySelector(".del").onclick = ()=>{
      state.used -= it.qty;
      delete state.history[k];
      render(); save();
    };
    h.appendChild(d);
  });
}

function copy() {
  if (!Object.keys(state.history).length) return;
  let out = "已配置 " + state.used + "/" + state.limit + "\n\n";
  for (const k in state.history) {
    out += k + " × " + state.history[k].qty + " " + state.history[k].snap + "\n";
  }
  navigator.clipboard.writeText(out);
  toast("已复制");
}

function clearAll() {
  state = {
    limit: 0,
    used: 0,
    qty: 0,
    mode: null,
    length: 85,
    dia: 7,
    history: {}
  };

  localStorage.removeItem("psfs_v37");

  L.value = 85;
  D.value = 7;

  c1.classList.remove("active");
  c2.classList.remove("active");

  render();
  toast("已清空");
}

function toast(t) {
  const x = document.getElementById("toast");
  x.innerText = t;
  x.style.opacity = 1;
  setTimeout(()=>x.style.opacity=0,1200);
}

function enableLongPressStepper() {
  document.querySelectorAll(".stepper.adjust button").forEach(btn=>{
    let timer = null;

    const start = e => {
      e.preventDefault();
      if (timer) return;

      timer = setTimeout(() => {
        timer = setInterval(() => {
          btn.click();
        }, 80);
      }, 300);
    };

    const stop = () => {
      clearTimeout(timer);
      clearInterval(timer);
      timer = null;
    };

    btn.addEventListener("mousedown", start);
    btn.addEventListener("touchstart", start);
    btn.addEventListener("mouseup", stop);
    btn.addEventListener("mouseleave", stop);
    btn.addEventListener("touchend", stop);
  });
}

render();
enableLongPressStepper();
</script>

</body>
</html>
