<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>笔套适配系统 V3.7</title>

<style>
html, body {
  overflow-x: hidden;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:#0b0f17;
    color:#e5e7eb;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
}

.app{
    width:100%;
    max-width:480px;
    padding:16px;
    box-sizing: border-box;
}

h1{
    text-align:center;
    font-size:20px;
    font-weight:600;
}

.card{
    background:#111827;
    border-radius:16px;
    border:1px solid #1f2937;
    padding:10px 14px;
    margin-bottom:10px;
}

input[type="range"]{
    width:100%;
    margin-top:10px;
    height:18px;
}

.row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
}

.big{
    font-size:24px;
    font-weight:400;
}

.tag{
    font-size:18px;
    font-weight:600;
    padding:6px 12px;
    border-radius:10px;
    background:#1f2937;
    text-align:center;
}

/* 长度等级标签 - 深色背景配白色文字 */
.tag.xs{background:#2b6e3c;}
.tag.s{background:#1e5a8a;}
.tag.m{background:#6b21a5;}
.tag.l{background:#b45309;}
.tag.xl{background:#9b2c2c;}

/* 直径等级标签 - 深色背景配白色文字 */
.tag.d1{background:#0e6b8f;}
.tag.d2{background:#0f766e;}
.tag.d3{background:#a16207;}
.tag.d4{background:#c2410c;}
.tag.d5{background:#b91c1c;}
.tag.d6{background:#a21caf;}

.tag.mode-hint {
    background: #f97316;
    color: #0b0f17;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.stepper{
    display:flex;
    align-items:center;
    gap:10px;
}

.stepper button {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #0b1220;
  color: #fff;
  font-size: 24px;
  font-weight: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  line-height: 1;
  transition: transform 0.08s ease, box-shadow 0.08s ease;
}

.stepper button:active {
  transform: scale(0.92);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
}

.stepper .big,
.total-stepper .big,
.adjust .big {
  font-weight: 400;
}

.stepper button.qty-btn-disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
    transform: none;
    box-shadow: none;
}

.switch{
    display:flex;
    gap:10px;
}

.switch button{
    flex:1;
    padding:12px 8px;
    font-size: 16px;
    border-radius:12px;
    border:1px solid #374151;
    background:#0f172a;
    color:#fff;
    font-weight:400;
    white-space: nowrap;
}

.switch .active{background:#2563eb;}

.item{
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0f172a;
    border: 1px solid #374151;
    border-radius: 14px;
    padding: 12px;
    margin-top: 10px;
    font-size: 18px;
    line-height: 1.4;
    gap: 10px;
}

.item-code {
    font-weight: 400;
    letter-spacing: 0.3px;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 4px;
    flex: 1;
    word-break: break-word;
    white-space: normal;
}

.highlight-number {
    color: #f97316;
    font-weight: 600;
    white-space: nowrap;
}

.del{
    background:#1f2937;
    border:none;
    color:#fff;
    padding:8px 12px;
    border-radius:8px;
    font-size:18px;
    font-weight:600;
    flex-shrink: 0;
    cursor: pointer;
}

.del {
    background: #f97316;
    color: #fff;
}

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    background:transparent;
    padding-bottom:12px;
    padding-top:12px;
    box-sizing:border-box;
}

.bottom-container {
    width: 100%;
    max-width: 480px;
    padding: 0 16px;
    box-sizing: border-box;
}

.bottom-buttons {
    display: flex;
    gap: 10px;
    width: 100%;
}

.bottom button {
    flex: 1;
    padding: 14px;
    font-size: 18px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

.bottom button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.toast{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:#22c55e;
    padding:10px 14px;
    border-radius:10px;
    font-weight:600;
    opacity:0;
    transition: opacity 0.2s ease;
    pointer-events: none;
    z-index: 200;
}

#confirmPanel {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:100;
  justify-content:center;
  align-items:center;
}

#confirmBox {
  background:#111827;
  border-radius:16px;
  padding:20px;
  width:92%;
  max-width:420px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.45);
}

#confirmText {
  font-size:24px;
  font-weight:600;
  margin-bottom:10px;
  word-break:break-word;
}

#confirmHint {
  font-size: 18px;
  font-weight: 400;
  color: #ffffff;
  margin-bottom:20px;
}

.confirm-btns {
  display:flex;
  gap:12px;
}

.confirm-btns button {
  flex:1;
  padding:14px;
  font-size:18px;
  font-weight:600;
  border-radius:12px;
  border:none;
}

#confirmCancel {
  background:#374151;
  color:#fff;
}

#confirmSave {
  background:#22c55e;
  color:#000;
}

#historyPanel {
    width:100%;
    max-width:480px;
    margin:0 auto;
    box-sizing:border-box;
    padding-bottom:120px;
}

#previewCount {
    color: #FCD34D;
    font-weight: 400;
}

#preview {
    text-align: center;
    font-weight: 600;
}

#q {
  font-size: 28px;
  color: #f97316;
  font-weight: 400;
}

#previewCard .row div[style*="font-size:18px"] {
    font-weight: 400 !important;
}

#previewCard .row label {
    font-weight: 400 !important;
}

#previewCard .stepper#previewStepper {
    display: flex !important;
    justify-content: center !important;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
}

.hint{
    font-size:16px;
    font-weight:600;
    color:#FCD34D;
    white-space:nowrap;
    transform: translateX(-6px);
}

/* 慢闪动画 */
@keyframes slowBlink2 {
  0%, 100% { opacity: 1; }
  25% { opacity: 0.25; }
  50% { opacity: 1; }
  75% { opacity: 0.25; }
}

#hint.blink, #c1.blink, #c2.blink, #copyBtn.blink {
  animation: slowBlink2 2.4s ease-in-out 1;
}

#Lc{
    font-size:20px;
}

#Dc{
    font-size:20px;
}

#copyBtn {
    border: 2px solid #f97316;
    background: #f97316;
    color: #0b0f17;
    font-weight: 600;
}

#supportedQtyTitle {
    font-weight: 600 !important;
}

#limitVal {
    font-weight: 600 !important;
}
</style>
</head>

<body>

<div class="app">
<h1>笔套适配系统 V3.7</h1>

<div class="card">
  <div class="row">
    <div id="supportedQtyTitle"
         style="font-size:18px; display:none; margin-right:6px;">
      支持数量 =
    </div>

    <span class="hint" id="hint"
          style="display:none; font-size:18px;">👉 设置支持数量</span>

    <div class="stepper total-stepper" style="margin:0;gap:6px; display:flex; align-items:center;">
      <button onclick="setLimit(-1)">–</button>
      <div class="big" id="limitVal" style="color:#FCD34D;">0</div>
      <button onclick="setLimit(1)">+</button>
    </div>
  </div>
</div>

<div class="card">
<input type="range" id="D" min="7" max="18.5" step="0.1" value="7">

<div class="row" style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
  <div class="stepper adjust" style="margin:0;gap:6px;">
    <button id="diaMinusBtn" onclick="diaStep(-0.1)">–</button>
    <div class="big" id="Dv">7.0</div>
    <button id="diaPlusBtn" onclick="diaStep(0.1)">+</button>
  </div>

  <div class="switch" style="margin:0;gap:6px;">
    <button id="c1" onclick="mode('clipped')">有笔夹</button>
    <button id="c2" onclick="mode('clipless')">无笔夹</button>
  </div>
</div>
<div class="tag" id="Dc" style="margin-top:10px;text-align:center;"></div>
</div>

<div class="card">
<div class="row" style="justify-content:center;gap:10px;">
<div style="font-size:18px;">长度</div>
<div class="stepper adjust" style="margin:0;gap:6px;">
<button onclick="lenStep(-0.1)">–</button>
<div class="big" id="Lv">85.0</div>
<button onclick="lenStep(0.1)">+</button>
</div>
</div>
<input type="range" min="85" max="165" step="1" value="85" id="L">
<div class="tag" id="Lc" style="margin-top:10px;text-align:center;"></div>
</div>

<div class="card" id="previewCard">
<div class="row" style="display:flex;justify-content:flex-start;align-items:center;gap:6px;">
  <label style="font-size:20px;">适配结果预览</label>
  <div class="big" id="previewCount" style="font-size:22px;"></div>
</div>

<div id="preview" style="font-size:23px;margin-top:10px;"></div>

<div class="row" style="margin-top:10px;display:flex;justify-content:center;align-items:center;gap:6px;">
  <div style="font-size:18px;">配置数量</div>
  <div class="stepper" style="margin:0;gap:6px;">
    <button onclick="qty(-1)">–</button>
    <div class="big" id="q">0</div>
    <button onclick="qty(1)">+</button>
  </div>
</div>
</div>

<div id="historyPanel">
  <div id="history"></div>
</div>

<div class="bottom">
  <div class="bottom-container">
    <div class="bottom-buttons">
      <button id="genBtn" style="background:#2563eb;color:#fff" onclick="showConfirm()">保存配置</button>
      <button id="copyBtn" onclick="copy()" disabled>复制全部</button>
      <button id="clearBtn" style="background:#ef4444;color:#fff" onclick="clearAll()">清空</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="confirmPanel">
  <div id="confirmBox">
    <div id="confirmText"></div>
    <div id="confirmHint">保存前请确认</div>
    <div class="confirm-btns">
      <button id="confirmCancel" onclick="hideConfirm()">取消</button>
      <button id="confirmSave" onclick="doSave()">保存</button>
    </div>
  </div>
</div>

<script>
function clean(v) {
  return Number.isInteger(v) ? v.toString() : v.toFixed(1);
}

let state = {
  limit: 0,
  used: 0,
  qty: 0,
  mode: null,
  length: 85,
  dia: 7,
  history: {}
};

const L = document.getElementById("L");
const D = document.getElementById("D");
const c1 = document.getElementById("c1");
const c2 = document.getElementById("c2");
const genBtn = document.getElementById("genBtn");
const copyBtn = document.getElementById("copyBtn");
const hintSpan = document.getElementById("hint");
const dcSpan = document.getElementById("Dc");
const previewCard = document.getElementById("previewCard");

function applyModeConstraints() {
  if (state.mode === "clipped") {
    D.min = 7;
    D.max = 18.5;
    if (state.dia < 7) state.dia = 7;
    if (state.dia > 18.5) state.dia = 18.5;
  } else if (state.mode === "clipless") {
    D.min = 8.5;
    D.max = 20.5;
    if (state.dia < 8.5) state.dia = 8.5;
    if (state.dia > 20.5) state.dia = 20.5;
  }
  D.value = state.dia;
}

function save() {
  localStorage.setItem("psfs_v37", JSON.stringify(state));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem("psfs_v37"));
    if (d) state = d;
  } catch (_) {}
}

load();
applyModeConstraints();

L.oninput = e => { state.length = +e.target.value; render(); save(); };
D.oninput = e => { state.dia = +e.target.value; render(); save(); };

function setLimit(v) {
  state.limit = Math.max(0, state.limit + v);
  if (state.limit === 0) {
    state.mode = null;
    c1.classList.remove("active");
    c2.classList.remove("active");
  }
  render(); 
  save();
}

function mode(m) {
  state.mode = m;
  applyModeConstraints();
  c1.classList.toggle("active", m === "clipped");
  c2.classList.toggle("active", m === "clipless");

  c1.classList.remove("blink");
  c2.classList.remove("blink");

  render(); 
  save();
}

function lenStep(v) {
  state.length = Math.max(85, Math.min(165, +(state.length + v).toFixed(1)));
  L.value = state.length;
  render(); 
  save();
}

function diaStep(v) {
  state.dia = Math.max(+D.min, Math.min(+D.max, +(state.dia + v).toFixed(1)));
  D.value = state.dia;
  render(); 
  save();
}

function toolCode() {
  if (!state.mode) return "?";
  return lenCode(state.length) + diaCode(state.dia);
}

function lenCode(v) {
  const ranges = [{max:102},{max:118},{max:135},{max:150},{max:165}];
  for (let i=0;i<ranges.length;i++){
    if (v<=ranges[i].max) return i+1;
  }
  return 5;
}

function diaCode(v) {
  if (!state.mode) return "A";
  const ranges = state.mode === "clipped"
    ? [
        { max: 8.5, code: "A" },
        { max: 10.5, code: "B" },
        { max: 12.5, code: "C" },
        { max: 14.5, code: "D" },
        { max: 16.5, code: "E" },
        { max: 18.5, code: "F" }
      ]
    : [
        { max: 10.5, code: "A" },
        { max: 12.5, code: "B" },
        { max: 14.5, code: "C" },
        { max: 16.5, code: "D" },
        { max: 18.5, code: "E" },
        { max: 20.5, code: "F" }
      ];
  for (const r of ranges) {
    if (v <= r.max) return r.code;
  }
  return "A";
}

function getDiameterText() {
  if (!state.mode) return "Ø —";
  const dc = diaCode(state.dia);
  const diaNames = ["Micro","Ultra Slim","Slim","Standard","Wide","Extra Wide"];
  const idx = dc.charCodeAt(0) - 65;
  return "Ø " + (diaNames[idx] || "—");
}

function getDiameterClass() {
  if (!state.mode) return "tag";
  const dc = diaCode(state.dia);
  const idx = dc.charCodeAt(0) - 65;
  return "tag " + (["d1","d2","d3","d4","d5","d6"][idx] || "tag");
}

function qty(v) {
  if (state.limit===0) return toast("请先设置数量");
  const next = Math.max(0, state.qty+v);
  if (state.used+next>state.limit) return toast("已达上限");
  state.qty = next;
  render(); 
  save();
}

function showConfirm() {
  if (state.limit===0 || state.mode===null) {
    toast("请先选有笔夹/无笔夹");
    return;
  }
  if (state.qty<=0) return toast("数量为 0");
  if (state.used+state.qty>state.limit) return toast("已达上限");

  const modeText = state.mode === "clipped" ? "有笔夹" : "无笔夹";
  const hl = "#f97316";

  document.getElementById("confirmText").innerHTML =
    toolCode() + " × <span style='color:" + hl + "; font-weight:600;'>" + state.qty + "</span>" +
    " (L<span style='color:" + hl + "; font-weight:600;'>" + clean(state.length) + "</span>" +
    "-Ø<span style='color:" + hl + "; font-weight:600;'>" + clean(state.dia) + "</span>" +
    "-<span style='color:" + hl + "; font-weight:600;'>" + modeText + "</span>)";

  document.getElementById("confirmPanel").style.display = "flex";
}

function hideConfirm() {
  document.getElementById("confirmPanel").style.display = "none";
}

function doSave() {
  const modeText = state.mode === "clipped" ? "有笔夹" : "无笔夹";
  const k = toolCode();

  if (!state.history[k]) {
    state.history[k] = {
      qty:0,
      snap: "(L" + clean(state.length) + "-Ø" + clean(state.dia) + "-" + modeText + ")"
    };
  }

  state.history[k].qty += state.qty;
  state.used += state.qty;

  c1.classList.remove("active");
  c2.classList.remove("active");
  state.mode = null;
  state.qty = 0;

  hideConfirm();
  render(); 
  save();

  toast(state.used + (state.used === 1 ? " 已添加配置" : " 已添加配置"));
}

function stopBlinking() {
  if (hintSpan) hintSpan.classList.remove("blink");
  if (copyBtn) copyBtn.classList.remove("blink");
  if (c1) c1.classList.remove("blink");
  if (c2) c2.classList.remove("blink");
}

function triggerBlink(element) {
  if (!element) return;
  element.classList.remove("blink");
  void element.offsetWidth;
  requestAnimationFrame(() => {
    element.classList.add("blink");
  });
}

function applyBlinking() {
  if (state.limit === 0) {
    if (hintSpan && hintSpan.style.display !== "none") {
      triggerBlink(hintSpan);
    }
  }
  
  if (state.limit >= 1 && state.mode === null) {
    if (c1) triggerBlink(c1);
    if (c2) triggerBlink(c2);
  }
  
  const totalUsed = Object.values(state.history).reduce((s, i) => s + i.qty, 0);
  if (state.limit > 0 && totalUsed === state.limit) {
    if (copyBtn && !copyBtn.disabled) {
      triggerBlink(copyBtn);
    }
  }
}

function render() {
  const title = document.getElementById("supportedQtyTitle");
  if (state.limit >= 1) {
    title.style.display = "block";
  } else {
    title.style.display = "none";
  }

  document.getElementById("limitVal").innerText = state.limit;

  const hintEl = document.getElementById("hint");
  if (state.limit === 0) {
    hintEl.style.display = "inline-block";
  } else {
    hintEl.style.display = "none";
  }

  document.getElementById("Lv").innerText = state.length.toFixed(1);
  document.getElementById("Dv").innerText = state.dia.toFixed(1);

  const lc = lenCode(state.length);
  document.getElementById("Lc").innerText =
    ["XS","S","M","L","XL"][lc-1] + " (150~165 mm)";
  document.getElementById("Lc").className = "tag " +
    ["xs","s","m","l","xl"][lc-1];

  if (state.mode !== null) {
    dcSpan.innerText = getDiameterText();
    dcSpan.className = getDiameterClass();
  } else if (state.limit === 0) {
    dcSpan.innerText = "直径";
    dcSpan.className = "tag";
  } else if (state.limit >= 1 && state.mode === null) {
    dcSpan.innerText = "请选择笔夹类型";
    dcSpan.className = "tag mode-hint";
  } else {
    dcSpan.innerText = "直径";
    dcSpan.className = "tag";
  }

  document.getElementById("q").innerText = state.qty;

  const modeText = state.mode === "clipped" ? "有笔夹" : state.mode === "clipless" ? "无笔夹" : "—";
  const hl = "#f97316";
  let previewCode = "?";
  if (state.mode) previewCode = toolCode();
  else previewCode = "—";

  document.getElementById("preview").innerHTML =
    previewCode + " × <span style='color:" + hl + "; font-weight:600;'>" + state.qty + "</span>" +
    " (L<span style='color:" + hl + "; font-weight:600;'>" + clean(state.length) + "</span>" +
    "-Ø<span style='color:" + hl + "; font-weight:600;'>" + clean(state.dia) + "</span>" +
    "-<span style='color:" + hl + "; font-weight:600;'>" + modeText + "</span>)";

  document.getElementById("previewCount").innerText =
    state.used + "/" + state.limit;

  const hasMode = state.mode !== null;
  const limitSet = state.limit >= 1;

  document.querySelectorAll(".card:nth-of-type(2) .switch button")
    .forEach(b => b.disabled = state.limit === 0);

  document.querySelectorAll(".card:nth-of-type(2) .stepper button")
    .forEach(b => b.disabled = !(state.limit >= 1 && hasMode));

  D.disabled = !(state.limit >= 1 && hasMode);
  L.disabled = !(state.limit >= 1 && hasMode);

  document.querySelectorAll(".card:nth-of-type(3) .stepper button")
    .forEach(b => b.disabled = !(state.limit >= 1 && hasMode));

  document.querySelectorAll("#previewCard .stepper button")
    .forEach(b => b.disabled = !(state.limit >= 1 && hasMode));

  if (state.limit >= 1 && hasMode) {
    previewCard.classList.remove("locked");
  } else {
    previewCard.classList.add("locked");
  }

  genBtn.disabled = !(state.limit >= 1 && hasMode && state.qty > 0);

  const totalUsed = Object.values(state.history).reduce((s, i) => s + i.qty, 0);
  copyBtn.disabled = totalUsed !== state.limit;

  drawHistory();

  applyBlinking();

  save();
}

// ========= 历史记录高亮函数 =========
function drawHistory() {
  const hDiv = document.getElementById("history");
  hDiv.innerHTML = "";
  const sortedKeys = Object.keys(state.history).sort();
  for (const key of sortedKeys) {
    const it = state.history[key];
    const d = document.createElement("div");
    d.className = "item";
    const textSpan = document.createElement("span");
    textSpan.className = "item-code";
    
    // 解析 snap 字符串并添加高亮
    let snapContent = it.snap;
    let inner = snapContent.slice(1, -1);
    let parts = inner.split("-");
    if (parts.length >= 3) {
      let lenPart = parts[0];
      let diaPart = parts[1];
      let modePart = parts[2];
      let lenVal = lenPart.replace("L", "");
      let diaVal = diaPart.replace("Ø", "");
      let highlightedSnap = `(L<span class="highlight-number">${lenVal}</span>-Ø<span class="highlight-number">${diaVal}</span>-<span class="highlight-number">${modePart}</span>)`;
      textSpan.innerHTML = `${key} × <span class="highlight-number">${it.qty}</span> ${highlightedSnap}`;
    } else {
      textSpan.innerHTML = `${key} × <span class="highlight-number">${it.qty}</span> ${it.snap}`;
    }
    
    const delBtn = document.createElement("button");
    delBtn.className = "del";
    delBtn.innerText = "删除";
    delBtn.onclick = (e) => {
      e.stopPropagation();
      state.used -= it.qty;
      delete state.history[key];
      render(); 
      save();
    };
    d.appendChild(textSpan);
    d.appendChild(delBtn);
    hDiv.appendChild(d);
  }
}

function copy() {
  if (!Object.keys(state.history).length) return;
  let out = "已配置 " + state.used + "/" + state.limit + "\n\n";
  for (const k in state.history) {
    out += k + " × " + state.history[k].qty + " " + state.history[k].snap + "\n";
  }
  navigator.clipboard.writeText(out);
  toast("已复制");
}

function clearAll() {
  state = {
    limit: 0,
    used: 0,
    qty: 0,
    mode: null,
    length: 85,
    dia: 7,
    history: {}
  };
  localStorage.removeItem("psfs_v37");
  L.value = 85;
  D.value = 7;
  c1.classList.remove("active");
  c2.classList.remove("active");
  render();
  toast("已清空");
}

function toast(t) {
  const x = document.getElementById("toast");
  x.innerText = t;
  x.style.opacity = 1;
  setTimeout(()=>x.style.opacity = 0, 1500);
}

document.addEventListener("click", (e) => {
  if (e.target && e.target.tagName === 'BUTTON') {
    stopBlinking();
  }
});

const isTouchDevice =
  "ontouchstart" in window ||
  navigator.maxTouchPoints > 0;

if (!isTouchDevice) {
  enableLongPressStepper();
}

function enableLongPressStepper() {
  document.querySelectorAll(".stepper.adjust button").forEach(btn=>{
    let timer = null;

    const start = e => {
      e.preventDefault();
      if (timer) return;

      timer = setTimeout(() => {
        timer = setInterval(() => {
          btn.click();
        }, 80);
      }, 300);
    };

    const stop = () => {
      clearTimeout(timer);
      clearInterval(timer);
      timer = null;
    };

    btn.addEventListener("mousedown", start);
    btn.addEventListener("touchstart", start);
    btn.addEventListener("mouseup", stop);
    btn.addEventListener("mouseleave", stop);
    btn.addEventListener("touchend", stop);
  });
}

render();
</script>
